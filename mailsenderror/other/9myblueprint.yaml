apiVersion: k8s.cloudogu.com/v3
kind: Blueprint
metadata:
  name: my-first-blueprint
  namespace: ecosystem
spec:
  displayName: My First Blueprint
  blueprint:
    config:
      global:
        - key: fqdn
          value: 34.159.55.169
        - key: domain
          value: "55.169"
        - key: certificate/type
          value: selfsigned
        - key: password-policy/min_length
          value: "1"
        - key: password-policy/must_contain_capital_letter
          value: "false"
        - key: password-policy/must_contain_digit
          value: "false"
        - key: password-policy/must_contain_lower_case_letter
          value: "false"
        - key: password-policy/must_contain_special_character
          value: "false"
        - key: admin_group
          value: cesAdmin
    dogus:
