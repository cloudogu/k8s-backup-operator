skipPreconditionValidation: false
components:
  k8s-service-discovery:
    version: "4.0.0"
    valuesObject:
      loadBalancerService:
        internalTrafficPolicy: Cluster
        externalTrafficPolicy: Cluster
  k8s-dogu-operator:
    version: "3.16.0"
  k8s-dogu-operator-crd:
    version: "2.10.0"
backup:
  enabled: true
  components:
    k8s-backup-operator:
      version: "2.1.0"
    k8s-backup-operator-crd:
      version: "1.7.0"
    k8s-velero:
      version: "10.0.1-6"
      valuesObject:
        velero:
          credentials:
            useSecret: true
            existingSecret: "velero-backup-target"
          configuration:
            backupStorageLocation:
              - name: "default"
                provider: "aws"
                bucket: "velero"
                accessMode: "ReadWrite"
                config:
                  region: "minio-default"
                  s3ForcePathStyle: true
                  s3Url: "http://192.168.56.1:9000"
                  publicUrl: "http://localhost:9000"

monitoring:
  enabled: false
