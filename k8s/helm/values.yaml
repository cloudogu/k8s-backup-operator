global:
  imagePullSecrets:
    - name: "ces-container-registries"
  networkPolicies:
    enabled: true
retention:
  strategy: keepAll
  garbageCollectionCron: "0 * * * *"
manager:
  env:
    stage: production
    logLevel: info
  image:
    registry: docker.io
    repository: cloudogu/k8s-backup-operator
    tag: 2.2.1
  imagePullPolicy: IfNotPresent
  resources:
    limits:
      memory: 105M
    requests:
      cpu: 15m
      memory: 105M
  replicas: 1
initContainer:
  schedule:
    name: ces-schedule
    cron: "00 02 * * *"
  image:
    registry: docker.io
    repository: alpine/kubectl
    tag: 1.34.1
metrics:
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: prometheus
