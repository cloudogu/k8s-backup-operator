apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "k8s-backup-operator.name" . }}-blueprint-list-role-binding
  labels:
  {{- include "k8s-backup-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "k8s-backup-operator.name" . }}-blueprint-list-role
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-backup-operator.name" . }}
    namespace: '{{ .Release.Namespace }}'