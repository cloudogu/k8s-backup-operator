{{- if .Values.global.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backup-operator-allow-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-backup-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: k8s-backup-operator
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ecosystem
          podSelector:
            matchLabels:
              app: k8s-prometheus
              k8s-prometheus: prometheus-server
              k8s.cloudogu.com/component.name: k8s-prometheus
      ports:
        - port: 8080
          protocol: TCP
  policyTypes:
    - Ingress
  {{- end }}
