{{- if .Values.global.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backup-operator-allow-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
      {{- include "k8s-backup-operator.labels" . | nindent 4 }}
spec:
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: k8s-prometheus
      ports:
        - protocol: TCP
          port: 8080
  podSelector:
    matchLabels:
      app.kubernetes.io/name: k8s-backup-operator
  policyTypes:
    - Ingress
{{- end }}