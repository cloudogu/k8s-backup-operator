# These permissions are necessary for the admin dogu to display the blueprint's name.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "k8s-backup-operator.name" . }}-blueprint-list-role
  labels:
  {{- include "k8s-backup-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - k8s.cloudogu.com
    resources:
      - blueprints
    verbs:
      - list
      - get